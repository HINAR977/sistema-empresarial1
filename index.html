<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Empresarial - Administración</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #1E3C72, #2A5298); min-height: 100vh; }

    /* LOGIN */
    .login-body { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-container { background: #fff; padding: 40px; border-radius: 15px; width: 380px; text-align: center; }
    .login-container h2 { margin-bottom: 20px; color: #1E3C72; }
    .login-container input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
    .login-container button { width: 100%; padding: 12px; background: #1E3C72; color: #fff; border: none; border-radius: 8px; cursor: pointer; }

    /* DASHBOARD */
    #dashboard { display: none; min-height: 100vh; }
    .dashboard-flex { display: flex; }
    .sidebar { width: 250px; background: #1E3C72; color: #fff; padding: 20px; min-height: 100vh; }
    .sidebar h2 { margin-bottom: 20px; }
    .sidebar a { display: block; color: #fff; text-decoration: none; margin: 15px 0; }
    .sidebar a:hover { text-decoration: underline; }
    .content-area { flex: 1; padding: 30px; background: #f4f4f9; }

    /* TABLA */
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    table th { background: #1E3C72; color: #fff; padding: 10px; text-align: left; }
    table td { padding: 10px; background: #fff; border-bottom: 1px solid #eee; }

    /* BOTONES */
    .btn-primary { padding: 10px 15px; background: #28a745; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .edit-btn { background: #ffc107; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    .delete-btn { background: #dc3545; border: none; padding: 5px 10px; border-radius: 5px; color: #fff; cursor: pointer; }

    /* MODAL */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #fff; padding: 25px; border-radius: 12px; width: 400px; }
    .modal-content h2 { margin-bottom: 15px; color: #1E3C72; }
    .modal-content input,
    .modal-content select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; }
    .form-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
    .btn-save { background: #1E3C72; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    .btn-cancelar { background: #dc3545; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }

    /* HINT contraseña al editar */
    .hint { font-size: 12px; color: #888; margin-top: -4px; margin-bottom: 4px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-body" id="loginContainer">
  <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
      <input id="loginUser" type="text" placeholder="Usuario" required>
      <input id="loginPass" type="password" placeholder="Contraseña" required>
      <button type="submit">Ingresar</button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dashboard-flex">
    <div class="sidebar">
      <h2>Empresa</h2>
      <a href="administracion.html">Usuarios</a>
      <a href="bodega.html">Bodega</a>
      <a href="ventas.html">Ventas</a>
      <a href="contabilidad.html">Contabilidad</a>
      <a href="catalogo.html">Catálogo</a>
      <a href="#" onclick="logout()">Cerrar Sesión</a>
    </div>

    <div class="content-area">
      <h1>Administración de Usuarios</h1>
      <button class="btn-primary" onclick="openFormUsuario()">+ Agregar Usuario</button>

      <table id="tablaUsuarios">
        <thead>
          <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Área</th>
            <th>Privilegio</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL USUARIO -->
<div id="modalUsuario" class="modal">
  <div class="modal-content">
    <h2 id="tituloFormUsuario">Nuevo Usuario</h2>
    <input type="text" id="usuario" placeholder="Usuario" required>
    <input type="password" id="contrasena" placeholder="Contraseña" required>
    <p class="hint" id="hintContrasena" style="display:none;">Deja vacío para mantener la contraseña actual</p>
    <input type="text" id="area" placeholder="Área" required>
    <select id="privilegios">
      <option value="">-- Selecciona un privilegio --</option>
      <option value="admin">Administrador</option>
      <option value="editor">Editor</option>
      <option value="visor">Visor</option>
    </select>
    <div class="form-buttons">
      <button class="btn-save" onclick="guardarUsuario()">Guardar</button>
      <button class="btn-cancelar" onclick="closeFormUsuario()">Cancelar</button>
    </div>
  </div>
</div>

<script src="crud_usuarios.js"></script>

<script>
  /* =========================
     LOGIN
  ========================= */
  window.addEventListener("load", () => {
    const token = localStorage.getItem("token");
    if (token) mostrarDashboard();
  });

  document.getElementById("loginForm").addEventListener("submit", function (e) {
    e.preventDefault();
    const usuario = document.getElementById("loginUser").value.trim();
    const password = document.getElementById("loginPass").value.trim();

    fetch("http://localhost:3000/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario, password })
    })
    .then(res => {
      if (!res.ok) throw new Error("Credenciales incorrectas");
      return res.json();
    })
    .then(data => {
      localStorage.setItem("token", data.token);
      mostrarDashboard();
    })
    .catch(() => alert("Usuario o contraseña incorrectos"));
  });

  function mostrarDashboard() {
    document.getElementById("loginContainer").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  }

  /* =========================
     LOGOUT
  ========================= */
  function logout() {
    localStorage.removeItem("token");
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("loginContainer").style.display = "flex";
  }
</script>

</body>
</html>
