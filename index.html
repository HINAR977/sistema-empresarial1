<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Empresarial - Dashboard Usuarios</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
body {background: linear-gradient(135deg,#1E3C72,#2A5298); min-height:100vh;}
/* LOGIN */
.login-body {display:flex; justify-content:center; align-items:center; min-height:100vh;}
.login-container {background:#fff; padding:40px; border-radius:15px; width:380px; text-align:center;}
.login-container input {width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ccc;}
.login-container button {width:100%; padding:12px; background:#1E3C72; color:#fff; border:none; border-radius:8px; cursor:pointer;}
/* DASHBOARD */
#dashboard {display:none; min-height:100vh;}
.dashboard-flex {display:flex;}
.sidebar {width:250px; background:#1E3C72; color:#fff; padding:20px;}
.sidebar a {display:block; color:#fff; text-decoration:none; margin:15px 0;}
.content-area {flex:1; padding:30px; background:#f4f4f9;}
table {width:100%; border-collapse:collapse; margin-top:20px;}
table th {background:#1E3C72; color:#fff; padding:10px;}
table td {padding:10px; background:#fff;}
.btn-primary {padding:10px 15px; background:#28a745; color:#fff; border:none; border-radius:6px; cursor:pointer;}
.edit-btn {background:#ffc107; border:none; padding:5px 10px; border-radius:5px;}
.delete-btn {background:#dc3545; border:none; padding:5px 10px; border-radius:5px; color:#fff;}
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center;}
.modal-content {background:#fff; padding:25px; border-radius:12px; width:400px;}
.modal-content input {width:100%; padding:10px; margin:8px 0; border-radius:6px; border:1px solid #ccc;}
.form-buttons {display:flex; justify-content:flex-end; gap:10px;}
.btn-save {background:#1E3C72; color:#fff; border:none; padding:8px 12px; border-radius:6px;}
.btn-cancelar {background:#dc3545; color:#fff; border:none; padding:8px 12px; border-radius:6px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-body" id="loginContainer">
    <div class="login-container">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
            <input id="user" type="text" placeholder="Usuario" required>
            <input id="pass" type="password" placeholder="Contraseña" required>
            <button type="submit">Ingresar</button>
        </form>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="dashboard-flex">
        <div class="sidebar">
            <h2>Empresa</h2>
            <a href="#" onclick="mostrarSeccion('usuarios')">Usuarios</a>
            <a href="productos.html">Productos</a>
            <a href="#" onclick="logout()">Cerrar Sesión</a>
        </div>

        <div class="content-area">
            <h1 id="tituloSeccion">Usuarios</h1>
            <button class="btn-primary" onclick="openFormUsuario()">Agregar Usuario</button>

            <table id="tablaUsuarios">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Contraseña</th>
                        <th>Área</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL USUARIO -->
<div id="modalUsuario" class="modal">
    <div class="modal-content">
        <h2 id="tituloFormUsuario">Nuevo Usuario</h2>
        <form id="formUsuario">
            <input type="text" id="usuario" placeholder="Usuario" required>
            <input type="password" id="contrasena" placeholder="Contraseña" required>
            <input type="text" id="area" placeholder="Área" required>
            <div class="form-buttons">
                <button type="button" class="btn-save" onclick="guardarUsuario()">Guardar</button>
                <button type="button" class="btn-cancelar" onclick="closeFormUsuario()">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script>
/* TOKEN AUTO LOGIN */
window.addEventListener("load", () => {
    const token = localStorage.getItem("token");
    if(token){
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    }
});

/* LOGIN REAL */
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const user = document.getElementById("user").value.trim();
    const pass = document.getElementById("pass").value.trim();

    fetch("http://localhost:3000/api/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ usuario: user, password: pass })
    })
    .then(res => res.json())
    .then(data => {
        if(data.token){
            localStorage.setItem("token", data.token);
            document.getElementById("loginContainer").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
        } else alert("Usuario o contraseña incorrectos");
    }).catch(()=> alert("Error de conexión con el servidor"));
});

/* LOGOUT */
function logout(){
    localStorage.removeItem("token");
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("loginContainer").style.display = "flex";
}

/* USUARIOS */
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let nextId = usuarios.length ? Math.max(...usuarios.map(u => u.id))+1 : 1;
let editandoId = null;

function guardarUsuario(){
    const usuario = document.getElementById("usuario").value.trim();
    const contrasena = document.getElementById("contrasena").value.trim();
    const area = document.getElementById("area").value.trim();
    if(!usuario || !contrasena || !area){ alert("Todos los campos son obligatorios"); return; }

    if(editandoId){
        const u = usuarios.find(x => x.id === editandoId);
        u.usuario = usuario; u.contrasena = contrasena; u.area = area;
    } else {
        usuarios.push({id: nextId++, usuario, contrasena, area});
    }
    localStorage.setItem("usuarios", JSON.stringify(usuarios));
    actualizarTabla();
    closeFormUsuario();
}

function actualizarTabla(){
    const tbody = document.querySelector("#tablaUsuarios tbody");
    tbody.innerHTML = "";
    usuarios.forEach(u=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${u.id}</td>
            <td>${u.usuario}</td>
            <td>******</td>
            <td>${u.area}</td>
            <td>
                <button class="edit-btn" onclick="editarUsuario(${u.id})">Editar</button>
                <button class="delete-btn" onclick="eliminarUsuario(${u.id})">Eliminar</button>
            </td>`;
        tbody.appendChild(tr);
    });
}

function eliminarUsuario(id){
    if(confirm("¿Seguro que deseas eliminar este usuario?")){
        usuarios = usuarios.filter(u => u.id!==id);
        localStorage.setItem("usuarios", JSON.stringify(usuarios));
        actualizarTabla();
    }
}

function editarUsuario(id){
    const u = usuarios.find(x=>x.id===id);
    if(!u) return;
    editandoId = id;
    document.getElementById("tituloFormUsuario").textContent="Editar Usuario";
    document.getElementById("usuario").value=u.usuario;
    document.getElementById("contrasena").value=u.contrasena;
    document.getElementById("area").value=u.area;
    openFormUsuario();
}

function openFormUsuario(){document.getElementById("modalUsuario").style.display="flex";}
function closeFormUsuario(){editandoId=null; document.getElementById("tituloFormUsuario").textContent="Nuevo Usuario"; document.getElementById("formUsuario").reset(); document.getElementById("modalUsuario").style.display="none";}

function mostrarSeccion(seccion){document.getElementById("tituloSeccion").textContent=seccion.charAt(0).toUpperCase()+seccion.slice(1);}
</script>

</body>
</html>
