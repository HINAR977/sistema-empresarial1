<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Empresarial - Iniciar Sesión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      background: linear-gradient(135deg, #1E3C72, #2A5298);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      width: 380px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .login-container h2 {
      margin-bottom: 8px;
      color: #1E3C72;
      font-size: 24px;
    }

    .login-container p.subtitulo {
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .login-container input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      transition: border 0.2s;
    }

    .login-container input:focus {
      outline: none;
      border-color: #1E3C72;
    }

    .login-container button {
      width: 100%;
      padding: 12px;
      background: #1E3C72;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      margin-top: 10px;
      transition: background 0.2s;
    }

    .login-container button:hover { background: #2A5298; }
    .login-container button:disabled { background: #aaa; cursor: not-allowed; }

    .error-msg {
      display: none;
      background: #fdecea;
      color: #c0392b;
      border: 1px solid #f5c6cb;
      border-radius: 6px;
      padding: 10px;
      margin-top: 12px;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Sistema Empresarial</h2>
    <p class="subtitulo">Ingresa tus credenciales para continuar</p>

    <form id="loginForm">
      <input id="loginUser" type="text" placeholder="Usuario" required autocomplete="username">
      <input id="loginPass" type="password" placeholder="Contraseña" required autocomplete="current-password">
      <button type="submit" id="btnIngresar">Ingresar</button>
    </form>

    <div class="error-msg" id="errorMsg">Usuario o contraseña incorrectos</div>
  </div>

  <script>
    /* =========================
       REDIRIGIR SI YA HAY SESIÓN
    ========================= */
    window.addEventListener("load", () => {
      const token = localStorage.getItem("token");
      const rol = localStorage.getItem("rol");
      if (token) redirigirPorRol(rol);
    });

    /* =========================
       LOGIN
    ========================= */
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const usuario = document.getElementById("loginUser").value.trim();
      const password = document.getElementById("loginPass").value.trim();
      const btn = document.getElementById("btnIngresar");
      const errorMsg = document.getElementById("errorMsg");

      errorMsg.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Verificando...";

      try {
        const res = await fetch("http://localhost:3000/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ usuario, password })
        });

        if (!res.ok) throw new Error("Credenciales incorrectas");

        const data = await res.json();

        localStorage.setItem("token", data.token);
        localStorage.setItem("usuario", data.usuario);
        localStorage.setItem("rol", data.privilegio);

        redirigirPorRol(data.privilegio);

      } catch {
        errorMsg.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Ingresar";
      }
    });

    /* =========================
       REDIRECCIÓN POR ROL
    ========================= */
    function redirigirPorRol(rol) {
      switch (rol) {
        case "admin":
          window.location.href = "administracion.html";
          break;
        case "editor":
          window.location.href = "dashboard.html";
          break;
        case "visor":
          window.location.href = "catalogo.html";
          break;
        default:
          window.location.href = "dashboard.html";
      }
    }
  </script>

</body>
</html>
