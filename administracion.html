<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administración</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
    <img src="assets/logo.png" class="topbar-logo">
    <span>Administración de Usuarios</span>
</header>

<aside class="sidebar">
    <h3>Administración</h3>
    <a href="dashboard.html">Inicio</a>
    <a href="index.html">Salir</a>
</aside>

<main class="content">
    <h1>Usuarios</h1>
    <button class="btn-primary" onclick="openFormUsuario()">Agregar Usuario</button>

    <table id="tablaUsuarios">
        <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Contraseña</th>
                <th>Área</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="modalUsuario" class="modal">
        <div class="modal-content">
            <h2 id="tituloFormUsuario">Nuevo Usuario</h2>
            <input type="text" id="usuario" placeholder="Usuario">
            <input type="text" id="contrasena" placeholder="Contraseña">
            <input type="text" id="area" placeholder="Área">
            <button onclick="guardarUsuario()">Guardar</button>
            <button class="btn-cancelar" onclick="closeFormUsuario()">Cancelar</button>
        </div>
    </div>
</main>

<script src="crud_usuarios.js"></script>
</body>
</html>
