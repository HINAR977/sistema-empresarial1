<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administración de Usuarios</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
    <img src="assets/logo.png" class="topbar-logo">
    <span>Administración de Usuarios</span>
</header>

<aside class="sidebar">
    <h3>Administración</h3>
    <a href="dashboard.html">Inicio</a>
    <a href="index.html">Salir</a>
</aside>

<main class="content">
    <h1>Usuarios</h1>
    <button class="btn-primary admin-only" onclick="openFormUsuario()">Agregar Usuario</button>

    <table id="tablaUsuarios">
        <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Contraseña</th>
                <th>Área</th>
                <th>Privilegios</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- MODAL -->
    <div id="modalUsuario" class="modal">
        <div class="modal-content">
            <h2 id="tituloFormUsuario">Nuevo Usuario</h2>
            <div id="mensajeExito">Usuario guardado con éxito!</div>
            <form id="formUsuario">
                <input type="text" id="usuario" placeholder="Usuario" required>
                <input type="password" id="contrasena" placeholder="Contraseña" required>
                <input type="text" id="area" placeholder="Área" required>
                <select id="privilegios" required>
                    <option value="">Seleccione privilegio</option>
                    <option value="adminUser">Administrador</option>
                    <option value="bodegaUser">Bodega</option>
                    <option value="contaUser">Contabilidad</option>
                    <option value="ventasUser">Ventas</option>
                </select>
                <div class="form-buttons">
                    <button type="button" class="btn-primary" onclick="guardarUsuario()">Guardar</button>
                    <button type="button" class="btn-cancelar" onclick="closeFormUsuario()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="crud_usuarios.js"></script>
</body>
</html>
